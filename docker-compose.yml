services:
  postgres:
    image: postgres:16-alpine
    container_name: treasure_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: treasure
      POSTGRES_PASSWORD: treasure_dev_password
      POSTGRES_DB: treasure_hunt
    ports:
      # Host 5433 to avoid clashing with a native Postgres on 5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treasure -d treasure_hunt"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: treasure_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
